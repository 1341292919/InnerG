services:
  # Redis 服务，用于缓存、会话管理等，提供键值存储功能
  InnerG-redis:
    container_name: InnerG-redis
    image: redis:bookworm
    volumes:
      - ./data/redis:/data
    env_file:
      - "./env/redis.env"
    networks:
      - InnerG

  # MySQL 服务，提供关系型数据库，用于存储结构化数据
  InnerG-mysql:
    container_name: InnerG-mysql
    image: mysql:9.0.1
    env_file:
      - "./env/mysql.env"
    networks:
      - InnerG
    volumes:
      - ../config/sql:/docker-entrypoint-initdb.d
      - ./data/mysql:/var/lib/mysql
    # MongoDB 服务
  InnerG-mongodb:
      container_name: InnerG-mongodb
      image: mongodb/mongodb-community-server:latest
      volumes:
        - ./data/mongodb:/data/db
        - ../config/mongodb:/docker-entrypoint-initdb.d
      env_file:
        - "./env/mongodb.env"
      networks:
        - InnerG
      restart: unless-stopped
  # 你的应用服务 - 仅向外暴露此服务的端口
  InnerG_server:
    container_name: InnerG_server
    image: innerg:1.0
    ports:
      - "20000:20000"  # 仅向外暴露应用服务的端口
    networks:
      - InnerG
    volumes:
      - ../config/:/app/config/
      - ./logs:/app/logs        # 挂载日志目录
    depends_on:
      - InnerG-redis
      - InnerG-mysql
      - InnerG-mongodb
    restart: unless-stopped

networks:
  InnerG:
    driver: bridge
    name: InnerG
